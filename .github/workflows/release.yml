name: Auto Release

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ secrets.GIT_TOKEN }}

      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: '8.4'
          extensions: dom, curl, libxml, mbstring, zip, pcntl, pdo, sqlite, pdo_sqlite, bcmath, soap, intl, gd, exif, iconv
          coverage: none

      - name: Install dependencies
        run: composer install --no-interaction --prefer-dist

      - name: Run tests
        run: vendor/bin/pest --compact

      - name: Run Pint
        run: vendor/bin/pint --test

      - name: Get last tag and version
        id: last_tag
        run: |
          # Get the most recent tag, or empty if no tags exist
          LAST_TAG=$(git describe --tags --abbrev=0 2>/dev/null || echo "")
          if [ -z "$LAST_TAG" ]; then
            VERSION="0.0.0"
          else
            VERSION=${LAST_TAG#v}
          fi
          echo "tag=$LAST_TAG" >> $GITHUB_OUTPUT
          echo "version=$VERSION" >> $GITHUB_OUTPUT
          echo "Last tag: $LAST_TAG (Version: $VERSION)"

      - name: Determine version bump type
        id: bump_type
        run: |
          LAST_TAG="${{ steps.last_tag.outputs.tag }}"

          if [ -z "$LAST_TAG" ]; then
            # No tags exist, evaluate all commits for initial bump type
            COMMITS=$(git log --pretty=format:"%s")
          else
            # Get commits since last tag
            COMMITS=$(git log "${LAST_TAG}..HEAD" --pretty=format:"%s")
          fi

          if [ -n "$COMMITS" ]; then
            # Check for BREAKING CHANGE (highest priority)
            if echo "$COMMITS" | grep -qiE "BREAKING CHANGE|break!"; then
              echo "type=major" >> $GITHUB_OUTPUT
              echo "Detected BREAKING CHANGE - will bump MAJOR version"
            # Check for feat (medium priority)
            elif echo "$COMMITS" | grep -qiE "^feat"; then
              echo "type=minor" >> $GITHUB_OUTPUT
              echo "Detected feat commits - will bump MINOR version"
            # Check for fix (lowest priority)
            elif echo "$COMMITS" | grep -qiE "^fix"; then
              echo "type=patch" >> $GITHUB_OUTPUT
              echo "Detected fix commits - will bump PATCH version"
            else
              echo "type=none" >> $GITHUB_OUTPUT
              echo "No conventional commits detected, keeping current version"
            fi
          else
             echo "type=none" >> $GITHUB_OUTPUT
             echo "No commits found to process"
          fi

      - name: Calculate new version
        id: new_version
        run: |
          CURRENT="${{ steps.last_tag.outputs.version }}"
          BUMP_TYPE="${{ steps.bump_type.outputs.type }}"

          # Split version into major, minor, patch
          IFS='.' read -r MAJOR MINOR PATCH <<< "$CURRENT"

          # Fallbacks in case they are empty
          MAJOR=${MAJOR:-0}
          MINOR=${MINOR:-0}
          PATCH=${PATCH:-0}

          case "$BUMP_TYPE" in
            major)
              MAJOR=$((MAJOR + 1))
              MINOR=0
              PATCH=0
              ;;
            minor)
              MINOR=$((MINOR + 1))
              PATCH=0
              ;;
            patch)
              PATCH=$((PATCH + 1))
              ;;
            *)
              # No bump, keep current version
              ;;
          esac

          NEW_VERSION="${MAJOR}.${MINOR}.${PATCH}"
          echo "version=$NEW_VERSION" >> $GITHUB_OUTPUT
          echo "New version: $NEW_VERSION"

      - name: Create and push tag
        if: steps.bump_type.outputs.type != 'none'
        run: |
          NEW_VERSION="${{ steps.new_version.outputs.version }}"
          TAG="v${NEW_VERSION}"
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git tag -a "$TAG" -m "Release $TAG" -m "Version $TAG of arseno/laravel-api-magic"
          git push origin "$TAG"

      - name: Create GitHub Release
        if: steps.bump_type.outputs.type != 'none'
        uses: actions/create-release@v1
        env:
          GITHUB_TOKEN: ${{ secrets.GIT_TOKEN }}
        with:
          tag_name: v${{ steps.new_version.outputs.version }}
          release_name: Release v${{ steps.new_version.outputs.version }}
          body: |
            ## Laravel API Magic v${{ steps.new_version.outputs.version }}

            Laravel API Magic adalah package untuk generate REST API lengkap dengan satu command.

            ### Installation

            ```bash
            composer require arseno/laravel-api-magic:${{ steps.new_version.outputs.version }}
            ```

            ### Quick Start

            ```bash
            php artisan api:magic
            ```

            ### What's Changed

            ${{ steps.changelog.outputs.changelog }}

            ### Features

            - One Command API Generation
            - Interactive Mode
            - Relationship Support (BelongsTo, HasMany, BelongsToMany)
            - API Versioning
            - Pest Testing
            - API Documentation UI
            - OpenAPI Export
          draft: false
          prerelease: false

      - name: Update Packagist
        if: steps.bump_type.outputs.type != 'none'
        run: |
          # Trigger Packagist update ping
          curl -X POST "https://packagist.org/api/update-package?username=Arseno25&apiToken=${{ secrets.PACKAGIST_TOKEN }}"
          echo "Packagist update triggered"

      - name: Summary
        run: |
          echo "### Release Summary :rocket:" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "**Package:** arseno/laravel-api-magic" >> $GITHUB_STEP_SUMMARY
          echo "**Previous Version:** ${{ steps.last_tag.outputs.version }}" >> $GITHUB_STEP_SUMMARY
          echo "**New Version:** ${{ steps.new_version.outputs.version }}" >> $GITHUB_STEP_SUMMARY
          echo "**Bump Type:** ${{ steps.bump_type.outputs.type }}" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          if [ "${{ steps.bump_type.outputs.type }}" == "none" ]; then
            echo ":information_source: No version bump needed (no conventional commits detected)" >> $GITHUB_STEP_SUMMARY
          else
            echo ":white_check_mark: Release created successfully!" >> $GITHUB_STEP_SUMMARY
          fi
