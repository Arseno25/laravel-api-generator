name: Auto Release

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: '8.4'
          extensions: dom, curl, libxml, mbstring, zip, pcntl, pdo, sqlite, pdo_sqlite, bcmath, soap, intl, gd, exif, iconv
          coverage: none

      - name: Get version from composer.json
        id: version
        run: |
          VERSION=$(grep '"version"' composer.json | sed 's/.*"version": "\(.*\)".*/\1/' | tr -d '",')
          echo "version=$VERSION" >> $GITHUB_OUTPUT
          echo "Package version: $VERSION"

      - name: Validate version
        run: |
          if [ -z "${{ steps.version.outputs.version }}" ]; then
            echo "Error: Version not found in composer.json"
            exit 1
          fi

      - name: Check if tag exists
        id: check_tag
        run: |
          TAG="v${{ steps.version.outputs.version }}"
          if git rev-parse "$TAG" >/dev/null 2>&1; then
            echo "exists=true" >> $GITHUB_OUTPUT
            echo "Tag $TAG already exists"
          else
            echo "exists=false" >> $GITHUB_OUTPUT
            echo "Tag $TAG does not exist"
          fi

      - name: Install dependencies
        run: composer install --no-interaction --prefer-dist

      - name: Run tests
        if: github.event_name == 'push' || github.event_name == 'workflow_dispatch'
        run: |
          vendor/bin/pest --compact

      - name: Run Pint
        if: github.event_name == 'push' || github.event_name == 'workflow_dispatch'
        run: |
          vendor/bin/pint --test

      - name: Create Release Tag
        if: github.event_name == 'push' && steps.check_tag.outputs.exists == 'false'
        env:
          GITHUB_TOKEN: ${{ secrets.GIT_TOKEN }}
        run: |
          TAG="v${{ steps.version.outputs.version }}"
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git tag -a "$TAG" -m "Release $TAG

          Version $TAG of arseno/laravel-api-magic"
          git push origin "$TAG"

      - name: Create GitHub Release
        if: github.event_name == 'push' && steps.check_tag.outputs.exists == 'false'
        uses: actions/create-release@v1
        env:
          GITHUB_TOKEN: ${{ secrets.GIT_TOKEN }}
        with:
          tag_name: v${{ steps.version.outputs.version }}
          release_name: Release v${{ steps.version.outputs.version }}
          body: |
            ## Laravel API Magic v${{ steps.version.outputs.version }}

            Laravel API Magic adalah package untuk generate REST API lengkap dengan satu command.

            ### Installation

            ```bash
            composer require arseno/laravel-api-magic:${{ steps.version.outputs.version }}
            ```

            ### Quick Start

            ```bash
            php artisan api:magic
            ```

            ### What's Changed

            See full changelog at: https://github.com/Arseno25/laravel-api-magic/commits/v${{ steps.version.outputs.version }}

            ### Features

            - One Command API Generation
            - Interactive Mode
            - Relationship Support (BelongsTo, HasMany, BelongsToMany)
            - API Versioning
            - Pest Testing
            - API Documentation UI
            - OpenAPI Export
          draft: false
          prerelease: false

      - name: Update Packagist
        if: github.event_name == 'push' && steps.check_tag.outputs.exists == 'false'
        run: |
          # Trigger Packagist update ping
          curl -X POST https://packagist.org/api/update-package?username=Arseno25&apiToken=${{ secrets.PACKAGIST_TOKEN }}
          echo "Packagist update triggered"

      - name: Summary
        run: |
          echo "### Release Summary :rocket:" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "**Package:** arseno/laravel-api-magic" >> $GITHUB_STEP_SUMMARY
          echo "**Version:** v${{ steps.version.outputs.version }}" >> $GITHUB_STEP_SUMMARY
          echo "**Event:** ${{ github.event_name }}" >> $GITHUB_STEP_SUMMARY
          echo "**Branch:** ${{ github.ref_name }}" >> $GITHUB_STEP_SUMMARY
          echo "**Commit:** ${{ github.sha }}" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          if [ "${{ steps.check_tag.outputs.exists }}" == "true" ]; then
            echo ":information_source: Tag already exists, release skipped" >> $GITHUB_STEP_SUMMARY
          else
            echo ":white_check_mark: Release created successfully!" >> $GITHUB_STEP_SUMMARY
          fi
