name: release

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  release:
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: '8.4'
          extensions: dom, curl, libxml, mbstring, zip, pcntl, pdo, sqlite, pdo_sqlite, bcmath, soap, intl, gd, exif, iconv, fileinfo
          coverage: none

      - name: Validate composer metadata
        run: composer validate --strict

      - name: Install dependencies
        run: composer install --no-interaction --prefer-dist --optimize-autoloader

      - name: Run test suite
        run: vendor/bin/pest --compact

      - name: Run Pint
        run: vendor/bin/pint --test

      - name: Get last tag and version
        id: last_tag
        run: |
          LAST_TAG=$(git describe --tags --abbrev=0 2>/dev/null || echo "")
          if [ -z "$LAST_TAG" ]; then
            VERSION="0.0.0"
          else
            VERSION=${LAST_TAG#v}
          fi

          echo "tag=$LAST_TAG" >> "$GITHUB_OUTPUT"
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"

      - name: Determine version bump type
        id: bump_type
        run: |
          LAST_TAG="${{ steps.last_tag.outputs.tag }}"

          if [ -z "$LAST_TAG" ]; then
            COMMITS=$(git log --pretty=format:"%s")
          else
            COMMITS=$(git log "${LAST_TAG}..HEAD" --pretty=format:"%s")
          fi

          if [ -z "$COMMITS" ]; then
            echo "type=none" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          if echo "$COMMITS" | grep -qiE "BREAKING CHANGE|break!"; then
            echo "type=major" >> "$GITHUB_OUTPUT"
          elif echo "$COMMITS" | grep -qiE "^feat"; then
            echo "type=minor" >> "$GITHUB_OUTPUT"
          elif echo "$COMMITS" | grep -qiE "^fix"; then
            echo "type=patch" >> "$GITHUB_OUTPUT"
          else
            echo "type=none" >> "$GITHUB_OUTPUT"
          fi

      - name: Calculate new version
        id: new_version
        run: |
          CURRENT="${{ steps.last_tag.outputs.version }}"
          BUMP_TYPE="${{ steps.bump_type.outputs.type }}"

          IFS='.' read -r MAJOR MINOR PATCH <<< "$CURRENT"
          MAJOR=${MAJOR:-0}
          MINOR=${MINOR:-0}
          PATCH=${PATCH:-0}

          case "$BUMP_TYPE" in
            major)
              MAJOR=$((MAJOR + 1))
              MINOR=0
              PATCH=0
              ;;
            minor)
              MINOR=$((MINOR + 1))
              PATCH=0
              ;;
            patch)
              PATCH=$((PATCH + 1))
              ;;
          esac

          echo "version=${MAJOR}.${MINOR}.${PATCH}" >> "$GITHUB_OUTPUT"

      - name: Create and push tag
        if: steps.bump_type.outputs.type != 'none'
        run: |
          TAG="v${{ steps.new_version.outputs.version }}"
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git tag -a "$TAG" -m "Release $TAG"
          git push origin "$TAG"

      - name: Create GitHub release
        if: steps.bump_type.outputs.type != 'none'
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v${{ steps.new_version.outputs.version }}
          generate_release_notes: true

      - name: Update Packagist
        if: steps.bump_type.outputs.type != 'none' && secrets.PACKAGIST_TOKEN != ''
        run: |
          curl --fail --show-error --silent \
            -X POST \
            -H "Content-Type: application/json" \
            -d '{"repository":{"url":"https://github.com/arseno25/laravel-api-magic"}}' \
            "https://packagist.org/api/update-package?username=Arseno25&apiToken=${{ secrets.PACKAGIST_TOKEN }}"

      - name: Summary
        run: |
          echo "### Release Summary" >> "$GITHUB_STEP_SUMMARY"
          echo "" >> "$GITHUB_STEP_SUMMARY"
          echo "**Package:** arseno25/laravel-api-magic" >> "$GITHUB_STEP_SUMMARY"
          echo "**Previous Version:** ${{ steps.last_tag.outputs.version }}" >> "$GITHUB_STEP_SUMMARY"
          echo "**New Version:** ${{ steps.new_version.outputs.version }}" >> "$GITHUB_STEP_SUMMARY"
          echo "**Bump Type:** ${{ steps.bump_type.outputs.type }}" >> "$GITHUB_STEP_SUMMARY"
          echo "" >> "$GITHUB_STEP_SUMMARY"
          if [ "${{ steps.bump_type.outputs.type }}" = "none" ]; then
            echo "No release was created because no conventional commit bump was detected." >> "$GITHUB_STEP_SUMMARY"
          else
            echo "Release and tag were created successfully." >> "$GITHUB_STEP_SUMMARY"
          fi
